name: Fetch LSZK Weather

on:
  schedule:
    # Alle 15 Minuten (UTC). GitHub cron kann verzögert feuern.
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weather-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch weather data
        env:
          WEATHERLINK_DEVICE_TOKEN: ${{ vars.WEATHERLINK_DEVICE_TOKEN }}
        run: python fetch_weather.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(weather): update LSZK $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
