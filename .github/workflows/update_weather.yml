name: Update Weather Data

# Wann soll das Skript laufen?
on:
  schedule:
    - cron: '*/15 * * * *' # Führt das Skript alle 15 Minuten aus
  workflow_dispatch: # Erlaubt es dir, das Skript auch manuell per Klick zu starten

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # Der Bot braucht Schreibrechte für das Repository
    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Python einrichten
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Wetterdaten abrufen
        env:
          WL_API_KEY: ${{ secrets.WL_API_KEY }}
          WL_API_SECRET: ${{ secrets.WL_API_SECRET }}
        run: python fetch_weather.py

      - name: Änderungen committen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add lszk_weather.json
          
          # Committet nur, wenn sich die Daten auch wirklich geändert haben
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Update: Neue Wetterdaten von LSZK" && git push)
